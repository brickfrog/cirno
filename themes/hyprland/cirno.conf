# Cirno — Touhou ice-fairy Hyprland color fragment
# https://github.com/brickfrog/cirno
# Install: add `source = ~/.config/hypr/cirno.conf` to your hyprland.conf,
# then reference the $variables below (already wired into general/decoration).

# ── Palette ($name = 0xAARRGGBB) ────────────────────────────────────────
$base       = 0xff0e1525
$mantle     = 0xff0a1120
$crust      = 0xff070c18
$surface0   = 0xff16203a
$surface1   = 0xff1f2c4a
$surface2   = 0xff2b3c60
$overlay0   = 0xff3d5277
$overlay1   = 0xff536b91
$overlay2   = 0xff6a82a8
$text       = 0xffd4e4f5
$subtext1   = 0xffbdcfe6
$subtext0   = 0xffa3b6d2
$comment    = 0xff5f7299
$ice        = 0xff7ad6f0
$frost      = 0xfface6f7
$cyan       = 0xff4cc6ea
$teal       = 0xff5fccc6
$sky        = 0xff6fb2ee
$blue       = 0xff5b90e4
$sapphire   = 0xff3aa9dd
$periwinkle = 0xff9fb6f2
$mauve      = 0xffb78ee2
$ribbon     = 0xffec5a72
$flare      = 0xfff4849a
$peach      = 0xffeca06a
$gold       = 0xffe8cd86
$cream      = 0xfff2dda0
$mint       = 0xff84ddb2
$spring     = 0xffa4ebc8

# ── Window borders ──────────────────────────────────────────────────────
general {
    col.active_border = rgba(7ad6f0ee) rgba(b78ee2ee) 45deg
    col.inactive_border = rgba(16203aff) rgba(1f2c4aff) 45deg
}

# ── Decoration / shadow ─────────────────────────────────────────────────
decoration {
    shadow {
        color = rgba(070c1899)
        color_inactive = rgba(070c1855)
    }
}

# ── Grouped windows ─────────────────────────────────────────────────────
group {
    col.border_active = rgba(7ad6f0ee) rgba(b78ee2ee) 45deg
    col.border_inactive = rgba(16203aff)
    col.border_locked_active = rgba(ec5a72ee) rgba(f4849aee) 45deg
    col.border_locked_inactive = rgba(2b3c60ff)

    groupbar {
        col.active = rgba(7ad6f0ee)
        col.inactive = rgba(16203aff)
        col.locked_active = rgba(ec5a72ee)
        col.locked_inactive = rgba(2b3c60ff)
        text_color = rgba(d4e4f5ff)
    }
}

# ── Misc ────────────────────────────────────────────────────────────────
# Primary accent = $ice (#7ad6f0). Warning = $gold, critical = $ribbon,
# good/charging = $mint. Use rgb(rrggbb) when you need an opaque color
# (e.g. plugins) and rgba(rrggbbaa) when you want alpha.
misc {
    background_color = rgb(0e1525)
}
