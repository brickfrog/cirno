# Cirno: a Touhou ice-fairy theme for mako
# https://github.com/brickfrog/cirno
# Install: copy to ~/.config/mako/config (or merge these sections into it)

[global]
font=JetBrainsMono Nerd Font 11
background-color=#0a1120f2
text-color=#d4e4f5ff
border-color=#7ad6f0ff
progress-color=over #16203aff
border-size=2
border-radius=12
padding=12
margin=8
default-timeout=6000
icons=1
max-icon-size=48
layer=overlay
anchor=top-right

[urgency=low]
background-color=#0e1525e6
text-color=#a3b6d2ff
border-color=#3d5277ff
default-timeout=4000

[urgency=normal]
background-color=#0a1120f2
text-color=#d4e4f5ff
border-color=#7ad6f0ff
default-timeout=6000

[urgency=critical]
background-color=#2b1722f2
text-color=#d4e4f5ff
border-color=#ec5a72ff
progress-color=over #4a2330ff
default-timeout=0
