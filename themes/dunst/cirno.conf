# Cirno: a Touhou ice-fairy theme for dunst
# https://github.com/brickfrog/cirno
# Install: merge the [global] and [urgency_*] sections below into your
# ~/.config/dunst/dunstrc. Settings shown are the colour-relevant ones;
# keep your own geometry/font tweaks as desired.

[global]
    frame_width = 2
    frame_color = "#7ad6f0"
    separator_color = "#2b3c60"
    corner_radius = 12
    background = "#0a1120"
    foreground = "#d4e4f5"

[urgency_low]
    background = "#0e1525"
    foreground = "#a3b6d2"
    frame_color = "#3d5277"
    timeout = 4

[urgency_normal]
    background = "#0a1120"
    foreground = "#d4e4f5"
    frame_color = "#7ad6f0"
    timeout = 6

[urgency_critical]
    background = "#2b1722"
    foreground = "#d4e4f5"
    frame_color = "#ec5a72"
    timeout = 0
