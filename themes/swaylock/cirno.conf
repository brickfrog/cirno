# Cirno: a Touhou ice-fairy theme for swaylock-effects
# https://github.com/brickfrog/cirno
# Install: copy to ~/.config/swaylock/config (swaylock-effects).
# NOTE: swaylock wants hex WITHOUT a leading '#', as RRGGBB or RRGGBBAA.

# Screen / background
color=0e1525
image=

# Indicator geometry
indicator-radius=110
indicator-thickness=10
indicator-idle-visible

# Ring (idle)
ring-color=7ad6f0
inside-color=0e1525cc
line-color=0a1120ff
text-color=d4e4f5ff

# Verifying
ring-ver-color=6fb2ee
inside-ver-color=16203acc
line-ver-color=0a1120ff
text-ver-color=d4e4f5ff

# Wrong password
ring-wrong-color=ec5a72
inside-wrong-color=2b1722cc
line-wrong-color=0a1120ff
text-wrong-color=f4849aff

# Cleared
ring-clear-color=84ddb2
inside-clear-color=16203acc
line-clear-color=0a1120ff
text-clear-color=0e1525ff

# Keypress / backspace highlights
key-hl-color=84ddb2
bs-hl-color=ec5a72

# Caps-lock state
caps-lock-key-hl-color=e8cd86
caps-lock-bs-hl-color=ec5a72

# Separator between ring segments
separator-color=00000000
